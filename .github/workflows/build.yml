name: Build Go Binaries

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Start MySQL test databases
        run: |
          cat > .env << 'EOF'
          MYSQL_ROOT_PASSWORD=s3cr3t
          MYSQL_DATABASE=chaos2
          EOF
          docker compose up --wait mysql-source mysql-target

      - name: Run full test suite (unit + integration)
        run: go test -v ./...

      - name: Stop test databases
        if: always()
        run: docker compose down -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -short -v ./...

      - name: Build macOS binary
        run: |
          mkdir -p bin
          GOOS=darwin GOARCH=amd64 go build -o bin/go-gtids-darwin-amd64 ./cmd/go-gtids

      - name: Build Linux binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/go-gtids-linux-amd64 ./cmd/go-gtids

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-gtids-darwin-amd64
          path: bin/go-gtids-darwin-amd64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-gtids-linux-amd64
          path: bin/go-gtids-linux-amd64
